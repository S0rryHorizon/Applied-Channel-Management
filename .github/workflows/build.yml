name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests and build
        run: ./gradlew build
      - name: Data launch validation
        run: ./gradlew runData
      - name: Dedicated-server GameTests
        run: ./gradlew runGameTestServer
      - uses: actions/upload-artifact@v4
        with:
          name: applied-channel-management
          path: build/libs/*.jar
